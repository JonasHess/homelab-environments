          condition: day
        - homeAssistantResources:
          - 1OG-Flur DimmerSwitch 01 Night
          condition: night
      homeAssistantResources:
      - light_flur_oben
  - name: 1OG Treppe Runter
    type: AqaraLightSwitchH2_1Ch
    devices:
    - SW-1OG-TREPPE-RUNTER
    groups:
    - position: '1'
      profile: AqaraLightSwitchH2_1ChLightDefault
      triggers:
      - trigger: AQARA_LIGHT_SWITCH_H2_1CH_SINGLE_UP
        sequences:
        - homeAssistantResources:
          - Treppe Oben DimmerSwitch 01 Day
          condition: day
        - homeAssistantResources:
          - Treppe Oben DimmerSwitch 01 Night
          condition: night
      homeAssistantResources:
      - light_treppe_oben
  - name: 1OG Treppe Hoch
    type: AqaraLightSwitchH2_1Ch
    devices:
    - SW-1OG-TREPPE-HOCH
    groups:
    - position: '1'
      profile: AqaraLightSwitchH2_1ChLightDefault
      triggers:
      - trigger: AQARA_LIGHT_SWITCH_H2_1CH_SINGLE_UP
        sequences:
        - homeAssistantResources:
          - Treppe Dach DimmerSwitch 01 Day
          condition: day
        - homeAssistantResources:
          - Treppe Dach DimmerSwitch 01 Night
          condition: night
      homeAssistantResources:
      - light_treppe_dach
  - name: 1OG Lena Buero
    type: AqaraLightSwitchH2_1Ch
    devices:
    - SW-1OG-LENA-BUERO
    groups:
    - position: '1'
      profile: AqaraLightSwitchH2_1ChLightDefault
      triggers:
      - trigger: AQARA_LIGHT_SWITCH_H2_1CH_SINGLE_UP
        sequences:
        - homeAssistantResources:
          - Buero Lena DimmerSwitch 01 Day
          condition: day
        - homeAssistantResources:
          - Buero Lena DimmerSwitch 01 Night
          condition: night
      homeAssistantResources:
      - light_buero_lena
  - name: 1OG Flur + Treppe EG-1OG Motion
    type: AqaraFP300
    devices:
    - M01
    - M05
    groups:
    - position: '1'
      profile: AqaraFP300LightDefault
      triggers:
      - trigger: AQARA_FP300_PRESENCE_DETECTED
        sequences:
        - homeAssistantResources:
          - Treppe Oben DimmerSwitch 01 Day
          condition: day
        - homeAssistantResources:
          - Treppe Oben DimmerSwitch 01 Night
          condition: night
      - trigger: AQARA_FP300_PRESENCE_DETECTED
        sequences:
        - homeAssistantResources:
          - 1OG-Flur DimmerSwitch 01 Day
          condition: day
        - homeAssistantResources:
          - 1OG-Flur DimmerSwitch 01 Night
          condition: night
      homeAssistantResources:
      - light_treppe_oben
      - light_flur_oben
  - name: Treppe 1OG-2OG Motion
    type: AqaraFP300
    devices:
    - M02
    - M07
    groups:
    - position: '1'
      profile: AqaraFP300LightDefault
      triggers:
      - trigger: AQARA_FP300_PRESENCE_DETECTED
        sequences:
        - homeAssistantResources:
          - Treppe Dach DimmerSwitch 01 Day
          condition: day
        - homeAssistantResources:
          - Treppe Dach DimmerSwitch 01 Night
          condition: night
      homeAssistantResources:
      - light_treppe_dach
      # TODO Ankleidezimmer: add its light resource here (and its scenes above) once the room has lights
  # Kueche and EG Flur form one occupancy zone: motion on either device (M03/M04) turns
  # on both lights; the zone only clears (both lights off) once both devices are clear.
  - name: Kueche + EG Flur Motion
    type: AqaraFP300
    devices:
    - M03
    - M04
    groups:
    - position: '1'
      profile: AqaraFP300LightDefault
      triggers:
      - trigger: AQARA_FP300_PRESENCE_DETECTED
        sequences:
        - homeAssistantResources:
          - Kueche DimmerSwitch 01 Day
          condition: day
        - homeAssistantResources:
          - Kueche DimmerSwitch 01 Night
          condition: night
      - trigger: AQARA_FP300_PRESENCE_DETECTED
        sequences:
        - homeAssistantResources:
          - EG-Flur DimmerSwitch 01 Day
          condition: day
        - homeAssistantResources:
          - EG-Flur DimmerSwitch 01 Night
          condition: night
      homeAssistantResources:
      - light_kueche
      - light_eingang_flur
  - name: Dach Motion
    type: AqaraFP1E
    devices:
    - M08
    groups:
    - position: '1'
      profile: AqaraFP1ELightDefault
      profileOptions:
        offDelaySeconds: 0
      triggers:
      - trigger: AQARA_FP1E_PRESENCE_DETECTED
        sequences:
        - homeAssistantResources:
          - Dach DimmerSwitch 01 Day
          condition: day
        - homeAssistantResources:
          - Dach DimmerSwitch 01 Night
          condition: night
      homeAssistantResources:
      - light_dach
  - name: Treppe Keller Motion
    type: HueSML001
    devices:
    - S23
