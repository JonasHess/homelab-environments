      profile: AqaraLightSwitchH2_1ChLightDefault
      triggers:
      - trigger: AQARA_LIGHT_SWITCH_H2_1CH_SINGLE_UP
        sequences:
        - homeAssistantResources:
          - Schlafzimmer DimmerSwitch 01 Day
          condition: day
        - homeAssistantResources:
          - Schlafzimmer DimmerSwitch 01 Night
          condition: night
      homeAssistantResources:
      - light_schlafzimmer
  - name: Dach Switch 3
    type: AqaraLightSwitchH2_1Ch
    devices:
    - SW-DACH-3
    groups:
    - position: '1'
      profile: AqaraLightSwitchH2_1ChLightDefault
      triggers:
      - trigger: AQARA_LIGHT_SWITCH_H2_1CH_SINGLE_UP
        sequences:
        - homeAssistantResources:
          - Treppe Dach DimmerSwitch 01 Day
          condition: day
        - homeAssistantResources:
          - Treppe Dach DimmerSwitch 01 Night
          condition: night
      homeAssistantResources:
      - light_treppe_dach
  - name: EG Flur Haustuer
    type: AqaraLightSwitchH2_1Ch
    devices:
    - SW-EG-FLUR-HAUSTUER
    groups:
    - position: '1'
      profile: AqaraLightSwitchH2_1ChLightDefault
      triggers:
      - trigger: AQARA_LIGHT_SWITCH_H2_1CH_SINGLE_UP
        sequences:
        - homeAssistantResources:
          - EG-Flur DimmerSwitch 01 Day
          condition: day
        - homeAssistantResources:
          - EG-Flur DimmerSwitch 01 Night
          condition: night
      homeAssistantResources:
      - light_eingang_flur
  - name: EG Flur Spiegel
    type: AqaraLightSwitchH2_1Ch
    devices:
    - SW-EG-FLUR-SPIEGEL
    groups:
    - position: '1'
      profile: AqaraLightSwitchH2_1ChLightDefault
      triggers:
      - trigger: AQARA_LIGHT_SWITCH_H2_1CH_SINGLE_UP
        sequences:
        - homeAssistantResources:
          - EG-Flur DimmerSwitch 01 Day
