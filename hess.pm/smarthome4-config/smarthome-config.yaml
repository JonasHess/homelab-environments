  - name: Buero Lena 01
    type: HueDimmerSwitch
    devices:
    - S39
    - S35
    - S46
    groups:
    - position: '1'
      profile: HUE_DIMMER_SWITCH_LIGHT_DEFAULT
      triggers:
      - trigger: BUTTON_1
        sequences:
        - homeAssistantResources:
          - Buero Lena DimmerSwitch 01 Day
          condition: day
        - homeAssistantResources:
          - Buero Lena DimmerSwitch 01 Night
          condition: night
      homeAssistantResources:
      - light_buero_lena
  - name: Gästezimmer
    type: HueDimmerSwitch
    devices:
    - S47
    - S56
    - S63
    groups:
    - position: '1'
      profile: HUE_DIMMER_SWITCH_LIGHT_DEFAULT
      triggers:
      - trigger: BUTTON_1
        sequences:
        - homeAssistantResources:
