          condition: night
      homeAssistantResources:
      - light_eingang_flur
  - name: EG Flur Treppe Hoch
    type: AqaraLightSwitchH2_1Ch
    devices:
    - SW-EG-FLUR-TREPPE-HOCH
    groups:
    - position: '1'
      profile: AqaraLightSwitchH2_1ChLightDefault
      triggers:
      - trigger: AQARA_LIGHT_SWITCH_H2_1CH_SINGLE_UP
        sequences:
        - homeAssistantResources:
          - Wohnzimmer DimmerSwitch 01 Day
          condition: day
        - homeAssistantResources:
          - Wohnzimmer DimmerSwitch 01 Night
          condition: night
      homeAssistantResources:
      - light_wohnzimmer
      - light_eingang_flur
  - name: EG Treppe Hoch
    type: AqaraLightSwitchH2_1Ch
    devices:
    - SW-EG-TREPPE-HOCH
    groups:
    - position: '1'
      profile: AqaraLightSwitchH2_1ChLightDefault
      triggers:
      - trigger: AQARA_LIGHT_SWITCH_H2_1CH_SINGLE_UP
        sequences:
        - homeAssistantResources:
          - Treppe Oben DimmerSwitch 01 Day
          condition: day
        - homeAssistantResources:
          - Treppe Oben DimmerSwitch 01 Night
          condition: night
      homeAssistantResources:
      - light_treppe_oben
  - name: EG Esszimmer 1 Wohnzimmer
    type: AqaraLightSwitchH2_1Ch
    devices:
    - SW-EG-ESSZ-1
    groups:
    - position: '1'
      profile: AqaraLightSwitchH2_1ChLightDefault
      triggers:
      - trigger: AQARA_LIGHT_SWITCH_H2_1CH_SINGLE_UP
        sequences:
        - homeAssistantResources:
          - Wohnzimmer DimmerSwitch 01 Day
          condition: day
        - homeAssistantResources:
          - Wohnzimmer DimmerSwitch 01 Night
          condition: night
      homeAssistantResources:
      - light_wohnzimmer
  - name: EG Esszimmer 2
    type: AqaraLightSwitchH2_1Ch
    devices:
    - SW-EG-ESSZ-2
    groups:
    - position: '1'
      profile: AqaraLightSwitchH2_1ChLightDefault
      triggers:
      - trigger: AQARA_LIGHT_SWITCH_H2_1CH_SINGLE_UP
        sequences:
        - homeAssistantResources:
          - Esszimmer DimmerSwitch 01 Day
          condition: day
        - homeAssistantResources:
          - Esszimmer DimmerSwitch 01 Night
          condition: night
      homeAssistantResources:
      - light_esszimmer
  # 2-gang shutter switch for the Wohnzimmer rollos. Gangs are crossed on purpose:
  # left gang controls the RIGHT rollo, right gang controls the LEFT rollo.
  - name: EG Esszimmer 3
    type: AqaraLightSwitchH2_2Ch
    devices:
    - SW-EG-ESSZ-3
    groups:
    - position: '1'
      profile: AqaraLightSwitchH2_2ChLeftShutterDefault
      homeAssistantResources:
      - cover_wohnzimmer_rollo_rechts
    - position: '1'
      profile: AqaraLightSwitchH2_2ChRightShutterDefault
      homeAssistantResources:
      - cover_wohnzimmer_rollo_links
  - name: EG Kueche 1
    type: AqaraLightSwitchH2_2Ch
    devices:
    - SW-EG-KUECHE-1
    groups:
    # Only the right gang is configured; the left gang is intentionally unwired for now.
    - position: '1'
      profile: AqaraLightSwitchH2_2ChRightLightDefault
      triggers:
      - trigger: AQARA_LIGHT_SWITCH_H2_2CH_RIGHT_UP
        sequences:
        - homeAssistantResources:
          - Kueche DimmerSwitch 01 Day
          condition: day
        - homeAssistantResources:
          - Kueche DimmerSwitch 01 Night
          condition: night
      homeAssistantResources:
      - light_kueche
  - name: 1OG Flur Buero
    type: AqaraLightSwitchH2_1Ch
    devices:
    - SW-1OG-FLUR-BUERO
    groups:
    - position: '1'
      profile: AqaraLightSwitchH2_1ChLightDefault
      triggers:
      - trigger: AQARA_LIGHT_SWITCH_H2_1CH_SINGLE_UP
        sequences:
