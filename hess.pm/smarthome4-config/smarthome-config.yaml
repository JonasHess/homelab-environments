version: '1.0'
smartHome:
  conditions:
  - type: SpelExpression
    id: day
    expression: '#timeOfDay() == ''DAY'''
  - type: SpelExpression
    id: night
    expression: '#timeOfDay() == ''NIGHT'''
  homeAssistantResources:
  - type: Light
    id: light_buero_jonas
    lookups:
    - type: staticEntity
      entityRefs:
      - light.buero_jonas
  - type: Light
    id: light_buero_lena
    lookups:
    - type: staticEntity
      entityRefs:
      - light.buero_lena
  - type: Light
    id: light_esszimmer
    lookups:
    - type: staticEntity
      entityRefs:
      - light.esszimmer
  - type: Light
    id: light_kueche
    lookups:
    - type: staticEntity
      entityRefs:
      - light.kueche
  - type: Light
    id: light_gaestezimmer
    lookups:
    - type: staticEntity
      entityRefs:
      - light.gaestezimmer
  - type: Light
    id: light_schlafzimmer
    offLockSeconds: 43200      # single Off press locks the bedroom against motion for 12 h
    disableLockSeconds: 43200  # double Off press also locks for 12 h
    lookups:
    - type: staticEntity
      entityRefs:
      - light.schlafzimmer
  - type: Light
    id: light_treppe_dach
    lookups:
    - type: staticEntity
      entityRefs:
      - light.treppe_dach
  - type: Light
    id: light_treppe_keller
    lookups:
    - type: staticEntity
      entityRefs:
      - light.treppe_keller
  - type: Light
    id: light_treppe_oben
    lookups:
    - type: staticEntity
      entityRefs:
      - light.treppe_oben
  - type: Light
    id: light_wohnzimmer
    lookups:
    - type: staticEntity
      entityRefs:
      - light.wohnzimmer
  - type: Cover
    id: cover_wohnzimmer_rollo_links
    lookups:
    - type: staticEntity
      entityRefs:
      - cover.wohnzimmer_rollo_links
  - type: Cover
    id: cover_wohnzimmer_rollo_rechts
    lookups:
    - type: staticEntity
      entityRefs:
      - cover.wohnzimmer_rollo_rechts
  - type: Light
    id: light_dach
    lookups:
    - type: staticEntity
      entityRefs:
      - light.dach
  - type: Light
    id: light_eingang_flur
    lookups:
    - type: staticEntity
      entityRefs:
      - light.eingang_flur_deckenlampe_tur
      - light.eingang_flur_deckenlampe_wz
  - type: Light
    id: light_flur_oben
    lookups:
    - type: staticEntity
      entityRefs:
      - light.flur_oben_1
      - light.flur_oben_2
      - light.flur_oben_3
  - type: Switch
    id: Switch Schlafzimmer Touchscreen
    lookups:
    - type: staticEntity
      entityRefs:
      - switch.schlafzimmer_touchscreen
  - type: Scene
    id: Schlafzimmer DimmerSwitch 01 Day
    lookups:
    - type: labelRegex
      labelRegex: Schlafzimmer__DimmerSwitch__01__day__.*
  - type: Scene
    id: Schlafzimmer DimmerSwitch 01 Night
    lookups:
    - type: labelRegex
      labelRegex: Schlafzimmer__DimmerSwitch__01__night__.*
  - type: Scene
    id: Esszimmer DimmerSwitch 01 Day
    lookups:
    - type: labelRegex
      labelRegex: Esszimmer__DimmerSwitch__01__day__.*
  - type: Scene
    id: Esszimmer DimmerSwitch 01 Night
    lookups:
    - type: labelRegex
      labelRegex: Esszimmer__DimmerSwitch__01__night__.*
  - type: Scene
    id: Kueche DimmerSwitch 01 Day
    lookups:
    - type: labelRegex
      labelRegex: Kueche__DimmerSwitch__01__day__.*
  - type: Scene
    id: Kueche DimmerSwitch 01 Night
    lookups:
    - type: labelRegex
      labelRegex: Kueche__DimmerSwitch__01__night__.*
  - type: Scene
    id: Wohnzimmer DimmerSwitch 01 Day
    lookups:
    - type: labelRegex
      labelRegex: Wohnzimmer__DimmerSwitch__01__day__.*
  - type: Scene
    id: Wohnzimmer DimmerSwitch 01 Night
    lookups:
    - type: labelRegex
      labelRegex: Wohnzimmer__DimmerSwitch__01__night__.*
  - type: Scene
    id: Buero Jonas DimmerSwitch 01 Day
    lookups:
    - type: labelRegex
      labelRegex: Buero Jonas__DimmerSwitch__01__day__.*
  - type: Scene
    id: Buero Jonas DimmerSwitch 01 Night
    lookups:
    - type: labelRegex
      labelRegex: Buero Jonas__DimmerSwitch__01__night__.*
  - type: Scene
    id: Buero Lena DimmerSwitch 01 Day
    lookups:
    - type: labelRegex
      labelRegex: Buero Lena__DimmerSwitch__01__day__.*
  - type: Scene
    id: Buero Lena DimmerSwitch 01 Night
    lookups:
    - type: labelRegex
      labelRegex: Buero Lena__DimmerSwitch__01__night__.*
  - type: Scene
    id: Dach DimmerSwitch 01 Day
    lookups:
    - type: labelRegex
      labelRegex: Dach__DimmerSwitch__01__day__.*
  - type: Scene
    id: Dach DimmerSwitch 01 Night
    lookups:
    - type: labelRegex
      labelRegex: Dach__DimmerSwitch__01__night__.*
  - type: Scene
    id: Gaestezimmer DimmerSwitch 01 Day
    lookups:
    - type: labelRegex
      labelRegex: Gaestezimmer__DimmerSwitch__01__day__.*
  - type: Scene
    id: Gaestezimmer DimmerSwitch 01 Night
    lookups:
    - type: labelRegex
      labelRegex: Gaestezimmer__DimmerSwitch__01__night__.*
  - type: Scene
    id: Treppe Dach DimmerSwitch 01 Day
    lookups:
    - type: labelRegex
      labelRegex: Treppe Dach__DimmerSwitch__01__day__.*
  - type: Scene
    id: Treppe Dach DimmerSwitch 01 Night
    lookups:
    - type: labelRegex
      labelRegex: Treppe Dach__DimmerSwitch__01__night__.*
  - type: Scene
    id: EG-Flur DimmerSwitch 01 Day
    lookups:
    - type: labelRegex
      labelRegex: EG-Flur__DimmerSwitch__01__day__.*
  - type: Scene
    id: EG-Flur DimmerSwitch 01 Night
    lookups:
    - type: labelRegex
      labelRegex: EG-Flur__DimmerSwitch__01__night__.*
  - type: Scene
    id: Treppe Oben DimmerSwitch 01 Day
    lookups:
    - type: labelRegex
      labelRegex: Treppe Oben__DimmerSwitch__01__day__.*
  - type: Scene
    id: Treppe Oben DimmerSwitch 01 Night
    lookups:
    - type: labelRegex
      labelRegex: Treppe Oben__DimmerSwitch__01__night__.*
  - type: Scene
    id: 1OG-Flur DimmerSwitch 01 Day
    lookups:
    - type: labelRegex
      labelRegex: 1OG-Flur__DimmerSwitch__01__day__.*
  - type: Scene
    id: 1OG-Flur DimmerSwitch 01 Night
    lookups:
    - type: labelRegex
      labelRegex: 1OG-Flur__DimmerSwitch__01__night__.*
  sensors:
  - name: Schlafzimmer
    type: HueDimmerSwitch
    devices:
    - S50
    - S81
    groups:
    - position: '1'
      profile: HUE_DIMMER_SWITCH_LIGHT_DEFAULT
      triggers:
      - trigger: BUTTON_1
        sequences:
        - homeAssistantResources:
          - Schlafzimmer DimmerSwitch 01 Day
          condition: day
        - homeAssistantResources:
          - Schlafzimmer DimmerSwitch 01 Night
          condition: night
      homeAssistantResources:
      - light_schlafzimmer
    - position: '2'
      profile: HUE_DIMMER_SWITCH_LIGHT_DEFAULT
      triggers:
      - trigger: BUTTON_1
        sequences:
        - homeAssistantResources:
          - Dach DimmerSwitch 01 Day
          condition: day
        - homeAssistantResources:
          - Dach DimmerSwitch 01 Night
          condition: night
      homeAssistantResources:
      - light_dach
    - position: '3'
      profile: HUE_DIMMER_SWITCH_LIGHT_DEFAULT
