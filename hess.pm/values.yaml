  # Monitors that internal DNS resolves *.hess.pm → 192.168.1.80 (the gateway LB IP).
  # LanInternalDnsBroken fires after 5min if the answer is wrong.
  lanDnsCheck:
    dnsServer: "192.168.1.1"
    queryName: "argocd.hess.pm"

  argocd:
    targetRevision: main

