# Global settings applied to all applications
global:
  cluster:
    serverip: 192.168.1.3
    username: root
    cluster-name: hess.pm
    ip-range: 192.168.1.80-192.168.1.90

  # Common domain configuration
  domain: hess.pm

  # Authentication settings
  akeyless:
    path: /hess.pm

  # Email settings for services
  email: Jonas@Hess.pm

  # DNS provider configuration
  cloudflare:
    email: Jonas@Hess.pm

  # Certificate management
  letsencrypt:
    email: Jonas@Hess.pm

  # OIDC provider for the Gateway-level SecurityPolicy.oidc. The Envoy OAuth2
  # filter signs cookies with one HMAC and shares them across *.hess.pm via
  # cookieDomain, so a single Cognito callback URL covers every protected
  # subdomain.
  oidc:
    issuerUrl: "https://cognito-idp.eu-central-1.amazonaws.com/eu-central-1_t9DQfKlSX"
    clientId: "6e1bl5i55ao7bhhcufk85ussm"
    cookieDomain: "hess.pm"
    # Akeyless path (relative to global.akeyless.path) for the Cognito client secret.
    # Keeping the old oauth2-proxy path until it is explicitly renamed in Akeyless.
    clientSecretAkeylessPath: /oidc/oauth2-proxy/client_secret

  # Gateway LoadBalancer IP (MetalLB assigns this to the Envoy proxy Service).
  # Single source of truth — also used by lanDnsCheck and samba avahi.
  gateway:
    loadBalancerIP: 192.168.1.80

  # Two ways into the Gateway:
  #   1. LAN clients hit the :443 listener directly (internal DNS resolves *.hess.pm → loadBalancerIP).
  #   2. Cloudflare-proxied requests → mTLS listener (port 4443). Cloudflare
  #      presents a leaf cert via zone-level Authenticated Origin Pulls.
  #      Envoy validates it against the CA below.
  security:
    # PEM of the CA cert (public info). The matching leaf cert + key are
    # uploaded to Cloudflare's zone-level AOP. Replace with the generated
    # CA PEM after running the openssl walkthrough.
