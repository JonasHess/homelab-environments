# All applications to be deployed by Argo CD
apps:
  argocd:
    enabled: true
    argocd:
      targetRevision: ~
      helm:
        values: {}

  akeyless:
    enabled: true
    argocd:
      targetRevision: ~
      helm:
        values: {}

  traefik:
    enabled: false
  envoy-gateway:
    enabled: true
    argocd:
      targetRevision: ~
      helm:
        values:
          loadBalancerIP: 192.168.178.191
          # No non-HTTPS listeners needed here.
  cert-manager:
    enabled: true
    argocd:
      targetRevision: ~
      helm: {}

  homeassistant:
    enabled: true
    argocd:
      targetRevision: ~
      helm:
        values:
          externalConfig:
            repoURL: "https://github.com/JonasHess/homelab-environments.git"
            targetRevision: "main"
            path: "unsereiner.net/homeassistant-config"
            configMapName: "homeassistant-app-config"
          generic:
            deployment:
              hostNetwork: true
              dnsPolicy: ClusterFirstWithHostNet
              pvcMounts:
                config:
                  hostPath: /mnt/nutellajunkies/apps/homeassistant/config
              initContainers:
                - name: install-hacs
                  image: alpine:3.19
                  command:
                    - sh
                    - -c
                    - |
                      if [ -d /config/custom_components/hacs ]; then
                        echo "HACS already installed, skipping"
                      else
                        apk add --no-cache unzip
                        mkdir -p /config/custom_components
                        wget -O /tmp/hacs.zip "https://github.com/hacs/integration/releases/latest/download/hacs.zip"
                        unzip -o /tmp/hacs.zip -d /config/custom_components/hacs
                        rm /tmp/hacs.zip
                        echo "HACS installed successfully"
                      fi
                  volumeMounts:
                    - name: homeassistant-config-volume
                      mountPath: /config
                - name: copy-config
                  image: busybox:1.36
                  command:
                    - sh
                    - -c
                    - |
                      echo "Copying config files from ConfigMap to /config..."
                      cp /configmap/*.yaml /config/
                      echo "Config files copied successfully"
                  volumeMounts:
                    - name: homeassistant-config-volume
                      mountPath: /config
                    - name: homeassistant-configmap-volume
                      mountPath: /configmap
              configMapMounts:
                configmap:
                  mountPath: /configmap
                  configMapName: homeassistant-app-config

  homer:
    enabled: true
    argocd:
      targetRevision: ~
      helm:
        values: {}

  reloader:
    enabled: true
    argocd:
      targetRevision: ~
      helm:
        values: {}

  restic:
    enabled: true
    argocd:
      targetRevision: ~
      helm:
        values:
          generic:
            persistentVolumeClaims:
              nutellajunkies:
                hostPath: /mnt/nutellajunkies
              restoreddata:
                hostPath: /mnt/nutellajunkies/apps/restic/restored-data
          cronjob:
            pvcMounts:
              nutellajunkies:
                mountPath: /mnt/nutellajunkies

  backrest:
    enabled: true
    argocd:
      targetRevision: ~
      helm:
        values:
          generic:
            persistentVolumeClaims:
              data:
                hostPath: /mnt/nutellajunkies/apps/backrest/data
              cache:
                hostPath: /mnt/nutellajunkies/apps/backrest/cache
              tmp:
                hostPath: /mnt/nutellajunkies/apps/backrest/tmp
              restore:
                hostPath: /mnt/nutellajunkies/apps/backrest/restore
