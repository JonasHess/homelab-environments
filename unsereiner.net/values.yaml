# Global settings applied to all applications
global:
  cluster:
    serverip: 192.168.178.101
    username: root
    cluster-name: unsereiner.net
    ip-range: 192.168.178.191-192.168.178.200

  # Common domain configuration
  domain: unsereiner.net

  # Authentication settings
  akeyless:
    path: /unsereiner.net

  # Email settings for services
  email: Jonas@Hess.pm

  # DNS provider configuration
  cloudflare:
    email: Jonas@Hess.pm

  # Certificate management
  letsencrypt:
    email: Jonas@Hess.pm

  # OIDC provider for the Gateway-level SecurityPolicy.oidc. The Envoy OAuth2
  # filter signs cookies with one HMAC and shares them across *.unsereiner.net
  # via cookieDomain, so a single Cognito callback URL covers every protected
  # subdomain.
  oidc:
    issuerUrl: "https://cognito-idp.eu-central-1.amazonaws.com/eu-central-1_t9DQfKlSX"
    clientId: "6e1bl5i55ao7bhhcufk85ussm"
    cookieDomain: "unsereiner.net"

  # Two ways into the Gateway:
  #   1. Source IP in lanCIDRs → LAN listener (port 443, no mTLS).
  #   2. Cloudflare-proxied requests → mTLS listener (port 4443). Cloudflare
  #      presents a leaf cert via zone-level Authenticated Origin Pulls.
  #      Envoy validates it against the CA below.
  #
  # NOTE: unsereiner.net is currently LAN-only — the public mTLS listener
  # will be programmed on the Gateway, but no router NAT forwards WAN:443
  # to :4443 yet, so it sits idle until the public path is wired up.
  security:
    lanCIDRs:
      - 192.168.178.0/24
    # Same CA cert as hess.pm — the matching leaf+key are already uploaded
    # to Cloudflare. Public exposure is gated by the router NAT (not in
    # place for this env yet), not by whether the listener exists.
