global:
  cluster:
    serverip: 192.168.0.5
    username: root
    cluster-name: home-server.dev
    ip-range: 192.168.0.91-192.168.0.100

  domain: "home-server.dev"
  akeyless:
    path: "/home-server.dev"
  email: "Jonas@Hess.pm"

  cloudflare:
    email: "Jonas@Hess.pm"

  letsencrypt:
    email: "Jonas@Hess.pm"

  # OIDC provider for the Gateway-level SecurityPolicy.oidc. The Envoy OAuth2
  # filter signs cookies with one HMAC and shares them across *.home-server.dev
  # via cookieDomain, so a single Cognito callback URL covers every protected
  # subdomain.
  oidc:
    issuerUrl: "https://cognito-idp.eu-central-1.amazonaws.com/eu-central-1_t9DQfKlSX"
    clientId: "6e1bl5i55ao7bhhcufk85ussm"
    cookieDomain: "home-server.dev"
    # Keeping the old oauth2-proxy path until it is explicitly renamed in Akeyless.
    clientSecretAkeylessPath: /oidc/oauth2-proxy/client_secret

  # Gateway LoadBalancer IP (MetalLB assigns this to the Envoy proxy Service).
  # Single source of truth — also used by lanDnsCheck.
  gateway:
    loadBalancerIP: 192.168.0.91

  # Two ways into the Gateway:
  #   1. LAN clients hit the :443 listener directly (internal DNS resolves *.home-server.dev → loadBalancerIP).
  #   2. Cloudflare-proxied requests → mTLS listener (port 4443). Cloudflare
  #      presents a leaf cert via zone-level Authenticated Origin Pulls.
  #      Envoy validates it against the CA below.
  #
  # NOTE: home-server.dev is currently LAN-only — the public mTLS listener
  # will be programmed on the Gateway, but no router NAT forwards WAN:443
  # to :4443 yet, so it sits idle until the public path is wired up.
  security:
    # Same CA cert as hess.pm — the matching leaf+key are already uploaded
    # to Cloudflare. Public exposure is gated by the router NAT (not in
    # place for this env yet), not by whether the listener exists.
    cloudflareOriginCA: |
