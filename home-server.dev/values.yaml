  argocd:
    targetRevision: main

apps:
  adguard:
    enabled: true
    argocd:
      targetRevision: ~
      helm:
        values:
          generic:
            deployment:
              pvcMounts:
                config:
                  hostPath: /mnt/data/apps/adguard/config
                data:
                  hostPath: /mnt/data/apps/adguard/data
  argocd:
    enabled: true
    argocd:
      targetRevision: ~
      helm:
        values: {}
  akeyless:
    enabled: true
    argocd:
      targetRevision: ~
      helm:
        values: {}
  traefik:
    enabled: false
  envoy-gateway:
    enabled: true
    argocd:
      targetRevision: ~
      namespace: &envoyNamespace "envoy-gateway"
      helm:
        values:
          additionalExposedPorts:
            # Keep `dns` (chart default 53/UDP) — AdGuard listens on it here.
            # Null out the listeners whose apps aren't deployed in this env.
            sftpgo: null
            ftp: null
            samba: null
          envoyGateway:
            namespace: *envoyNamespace
  cert-manager:
    enabled: true
    argocd:
      targetRevision: ~
      helm: {}
